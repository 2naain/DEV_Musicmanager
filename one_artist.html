{% extends "base.html" %}
{% block title %}{{ artist.name }} — MusicItself{% endblock %}
{% block content %}

<div style="
    display: flex;
    gap: 48px;
    align-items: flex-start;
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 24px;
">
    <!-- Columna izquierda: nombre ENCIMA de la imagen -->
    <div style="flex-shrink: 0; width: 360px;">
        <h1 style="
            margin: 0 0 16px 0;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 800;
        ">{{ artist.name }}</h1>

        {% if artist.image_url %}
        <img src="{{ artist.image_url }}"
             alt="{{ artist.name }}"
             style="width: 100%; border-radius: 8px; display: block;">
        {% else %}
        <div style="
            width: 360px;
            height: 460px;
            background: #1a1a2e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        ">🎤</div>
        {% endif %}
    </div>

    <!-- Columna derecha: descripción + volver -->
    <div style="flex: 1; padding-top: 56px; display: flex; flex-direction: column; gap: 20px;">
        {% if artist.description %}
        <p style="
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: justify;
            color: #dddddd;
            margin: 0;
        ">{{ artist.description }}</p>
        {% endif %}

        <a href="/artists" style="
            display: inline-block;
            color: #aaaaaa;
            text-decoration: none;
            font-size: 0.95rem;
        ">← Volver a Artistas</a>
    </div>
</div>

{% endblock %}
