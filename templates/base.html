<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>

        body {
            background: #0d0d0d;
            color : #e0e0e0;
        }
        .song-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 15px;
        }
        .song-card:hover {
            transform: translateY(-4px);
        }

        .badge-pop {
            background: #1a3a5c;
            color: #5ba3e0;
        }

        .badge-rock {
            background: #3a1a1a;
            color: #e05b5b;
        }

        .badge-jazz {
            background: #3a2a0a;
            color: #e0a85b;
        }

        .badge-hiphop {
            background: #2a1a3a;
            color: #b05be0;
        }

        .badge-electronica {
            background: #0a3a3a;
            color: #5be0e0;
        }

        .badge-clasica {
            background: #3a3a1a;
            color: #e0e05b;
        }

        .badge-reggaeton {
            background: #3a250a;
            color: #ffb84d;
        }

        .badge-metal {
        background: #222222;
        color: #cccccc;
        }

    </style>
    <title>{% block title %}
        Musica
    {% endblock %}
    </title>

</head>
<body>

<div class="content">
    {% include 'navbar.html' %}

    <main>
        {% block content %} {% endblock %}
    </main>
{% include 'footer.html' %}

</div>

</body>
</html>
