<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>{% block title %}MusicItself{% endblock %}</title>
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .brand-title, .page-title { font-family: 'Playfair Display', serif; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5080 100%);
            border-bottom: 1px solid #3a6a9a;
            padding: 8px 0;
        }

        header .logo img {
            height: 75px;
            width: auto;
            mix-blend-mode: lighten;
        }

        header nav a {
            color: #c8dff0;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        header nav a:hover {
            color: #fff;
            background: rgba(255,255,255,0.12);
        }

        header nav a.active {
            color: #fff;
            background: rgba(255,255,255,0.15);
        }

        .search-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            color: #fff;
            background: rgba(255,255,255,0.15);
        }

        .search-input::placeholder { color: rgba(255,255,255,0.5); }

        /* ── MAIN ── */
        main {
            flex: 1;
            padding: 32px 0;
        }

        /* ── CARDS ── */
        .song-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .song-card:hover {
            transform: translateY(-4px);
            border-color: #3a6a9a33;
        }

        .song-card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
        }

        .song-card-placeholder {
            width: 100%;
            height: 160px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .song-card-body { padding: 14px; }

        .song-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Playfair Display', serif;
        }

        .song-card-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        /* ── BADGES ── */
        .badge-genre {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 99px;
            font-weight: 500;
            display: inline-block;
        }

        .badge-pop         { background: #1a3a5c; color: #5ba3e0; }
        .badge-rock        { background: #3a1a1a; color: #e05b5b; }
        .badge-jazz        { background: #3a2a0a; color: #e0a85b; }
        .badge-hiphop      { background: #2a1a4a; color: #a05be0; }
        .badge-electronica { background: #0a2a20; color: #5be0a8; }
        .badge-clasica     { background: #2a2a2a; color: #aaa; }
        .badge-reggaeton   { background: #2a1a0a; color: #e07a5b; }
        .badge-metal       { background: #1a1a1a; color: #888; }

        .detail-btn {
            display: block;
            text-align: center;
            font-size: 11px;
            color: #555;
            padding: 8px;
            border-top: 1px solid #222;
            text-decoration: none;
            transition: color 0.2s, background 0.2s;
        }

        .detail-btn:hover { color: #4a8cbf; background: #111; }

        /* ── FORMULARIOS ── */
        .form-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 28px;
            max-width: 480px;
        }

        .form-control, .form-select {
            background: #111;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            border-radius: 8px;
        }

        .form-control:focus, .form-select:focus {
            background: #111;
            border-color: #4a8cbf;
            color: #fff;
            box-shadow: none;
        }

        .form-control::placeholder { color: #444; }
        .form-label { color: #aaa; font-size: 13px; margin-bottom: 4px; }

        .btn-primary {
            background: #2a6090;
            border-color: #2a6090;
            color: #fff;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #1e4f78;
            border-color: #1e4f78;
            color: #fff;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #4a8cbf; }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 24px;
            font-family: 'Playfair Display', serif;
        }

        /* ── FOOTER ── */
        footer {
            background: #111;
            border-top: 1px solid #1e1e1e;
            padding: 20px 0;
            text-align: center;
            font-size: 13px;
            color: #444;
        }

        footer a { color: #666; text-decoration: none; }
        footer a:hover { color: #4a8cbf; }
    </style>
</head>
<body>

<header>
    <div class="container-fluid d-flex align-items-center justify-content-between px-4">
        <div class="logo">
            <a href="/">
                <img src="https://pqrqsrdywlxdegadiege.supabase.co/storage/v1/object/public/music/logo.jpeg"
                     alt="MusicItself">
            </a>
        </div>

        <nav class="d-flex align-items-center gap-1">
            <a href="/">Inicio</a>
            <a href="/songs">Canciones</a>
            <a href="/artists">Artistas</a>
            <a href="/playlists">Playlists</a>
            <a href="/stats">Estadísticas</a>
        </nav>

        <form action="{{ search_action | default('/') }}" method="get" class="d-flex align-items-center gap-2">
            <input class="search-input" type="search" name="q"
                   value="{{ q if q else '' }}"
                   placeholder="🔍 {{ search_placeholder | default('Buscar...') }}">
        </form>
    </div>
</header>

<main>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer>
    <div class="container">
        <p>🎵 <strong style="color:#666;">MusicItself</strong> ·2naain .</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
