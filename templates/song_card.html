<div class="song-card">
    {% if song.image_url %}
        <figure>
            <img src="{{ song.image_url }}" class="song-card-img" alt="{{ song.title }}">
            <figcaption style="display:none;">{{ song.title }}</figcaption>
        </figure>
    {% else %}
        <div class="song-card-placeholder">🎵</div>
    {% endif %}

    <div class="song-card-body">
        <div class="song-card-title">{{ song.title }}</div>
        <div class="song-card-meta">
            <span>{{ song.duration | duration }}</span>
            {% if artist_map is defined and song.artist_id %}
                <span style="color:#888;">{{ artist_map.get(song.artist_id, '') }}</span>
            {% endif %}
        </div>
        {% if song.genre %}
            <span class="badge-genre badge-{{ song.genre.value }}">{{ song.genre.value }}</span>
        {% endif %}
    </div>
</div>
