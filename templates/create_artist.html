{% extends "base.html" %}
{% block title %}Agregar Artista — MusicItself{% endblock %}
{% block content %}
<p class="page-title">Agregar Artista</p>

<div class="form-card">
    <form method="post" action="{{ create_url }}" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label" for="name">Nombre *</label>
            <input class="form-control" type="text" id="name" name="name"
                   placeholder="Nombre del artista" required minlength="2" maxlength="100">
        </div>

        <div class="mb-4">
            <label class="form-label" for="image">Imagen (opcional)</label>
            <input class="form-control" type="file" id="image" name="image" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary w-100">Agregar artista</button>
    </form>
    <a href="/artists" style="display:inline-block; margin-top:16px; color:#666; text-decoration:none; font-size:13px;">← Volver</a>
</div>
{% endblock %}
