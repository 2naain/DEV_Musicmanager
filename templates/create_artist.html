{% extends "base.html" %}
{% block title %}Agregar Artista — MusicItself{% endblock %}
{% block content %}
<p class="page-title">Agregar Artista</p>

<div class="form-card">
    {% if error %}
    <div style="background:#3a1a1a; border:1px solid #7a2a2a; color:#e05b5b; border-radius:8px; padding:12px; margin-bottom:16px; font-size:13px;">
        {{ error }}
    </div>
    {% endif %}
    <form method="post" action="{{ create_url }}" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label" for="name">Nombre *</label>
            <input class="form-control" type="text" id="name" name="name"
                   placeholder="Nombre del artista" required minlength="2" maxlength="100">
        </div>

        <div class="mb-3">
            <label class="form-label" for="descripcion">Descripción (opcional)</label>
            <textarea class="form-control" id="descripcion" name="descripcion"
                      rows="3" maxlength="500"
                      placeholder="Biografía o descripción del artista..."></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label" for="image">Imagen (opcional)</label>
            <input class="form-control" type="file" id="image" name="image" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary w-100">Agregar artista</button>
    </form>
    <a href="/artists" class="btn-back">← Volver</a>
</div>
{% endblock %}
