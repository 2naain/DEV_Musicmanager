{% extends "base.html" %}
{% block title %}Crear Playlist — MusicItself{% endblock %}
{% block content %}
<p class="page-title">Crear Playlist</p>

<div class="form-card">
    <form method="post" action="{{ create_url }}">

        <div class="mb-3">
            <label class="form-label" for="name">Nombre *</label>
            <input class="form-control" type="text" id="name" name="name"
                   placeholder="Nombre de la playlist" required minlength="2" maxlength="100">
        </div>

        <div class="mb-4">
            <label class="form-label" for="description">Descripción (opcional)</label>
            <textarea class="form-control" id="description" name="description"
                      rows="3" maxlength="500"
                      placeholder="Describe tu playlist..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Crear playlist</button>
    </form>
    <a href="/playlists" style="display:inline-block; margin-top:16px; color:#666; text-decoration:none; font-size:13px;">← Volver</a>
</div>
{% endblock %}
